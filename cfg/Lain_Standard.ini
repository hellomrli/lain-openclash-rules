;Lain 标准版规则
;基于 Aethersailor/Custom_OpenClash_Rules 思路精简：保留 OpenClash 常用直连/兜底逻辑，移除 YouTube/Netflix/Disney+/HBO/PrimeVideo 等媒体细分。
;规则仓库不包含任何订阅链接、节点名称或节点信息。

[custom]
; ===== 规则区：从上到下匹配 =====
; 本地地址直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

; Aethersailor 原项目直连/代理补充规则
ruleset=🎯 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; 自定义核心服务
ruleset=🤖 AI服务,clash-classic:https://testingcf.jsdelivr.net/gh/hellomrli/lain-openclash-rules@main/rule/AI_Classical.yaml,28800
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🇯🇵 DMM,clash-classic:https://testingcf.jsdelivr.net/gh/hellomrli/lain-openclash-rules@main/rule/DMM_Classical.yaml,28800
ruleset=🐢 乌龟服,clash-classic:https://testingcf.jsdelivr.net/gh/hellomrli/lain-openclash-rules@main/rule/TurtleWoW_Classical.yaml,28800
ruleset=📺 Bilibili,clash-classic:https://testingcf.jsdelivr.net/gh/hellomrli/lain-openclash-rules@main/rule/Bilibili_Classical.yaml,28800

; 常用非媒体服务保留
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🚀 手动选择,[]GEOSITE,gfw

; 国内兜底直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; 非标端口直连优化与最终兜底
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
ruleset=🐟 漏网之鱼,[]FINAL

; ===== 策略组区 =====
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50

custom_proxy_group=🤖 AI服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇭🇰 香港节点`.*
custom_proxy_group=🇯🇵 DMM`select`[]🇯🇵 日本节点`[]🚀 手动选择`[]♻️ 自动选择`.*
custom_proxy_group=🐢 乌龟服`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`.*
custom_proxy_group=📺 Bilibili`select`[]🎯 全球直连`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🚀 手动选择`.*

custom_proxy_group=🚀 GitHub`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🎯 全球直连`.*
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 手动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`.*
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 手动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`.*
custom_proxy_group=🇬 谷歌服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`.*
custom_proxy_group=💬 即时通讯`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🎯 全球直连`.*
custom_proxy_group=🔀 非标端口`select`[]🎯 全球直连`[]🚀 手动选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎯 全球直连`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`.*

; 仅保留三个地区节点组：香港 / 美国 / 日本
custom_proxy_group=🇭🇰 香港节点`url-test`(🇭🇰|港|HK|Hong Kong|HONGKONG|HKG)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(🇺🇸|美|US|United States|USA|America|Los Angeles|San Jose|Seattle|Dallas|New York)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(🇯🇵|日|JP|Japan|Tokyo|Osaka|NRT|HND|KIX)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; 下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
